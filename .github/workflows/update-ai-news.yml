name: Update AI News and Deploy

on:
  # 每2小时整点执行
  schedule:
    - cron: "0 */2 * * *"
  # 允许手动点击触发
  workflow_dispatch:
  # 推送代码时也触发一次
  push:
    branches: [ main ]

# 关键：授予仓库读写权限，必须加
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Fetch latest news data
        run: pnpm fetch

      - name: Commit & push data changes
        run: |
          git config --global user.name "CalmBin-Auto"
          git config --global user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "auto: update news data $(date +'%Y-%m-%d %H:%M')" || true
          git push origin main

      - name: Build web static
        run: |
          cd web
          pnpm install
          pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
